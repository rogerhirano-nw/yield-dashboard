name: Daily data health check

# Verifies post-sweep data invariants in prod (DV id hygiene + DV↔GAM join
# rate + per-table freshness + sweep liveness) and emails a one-line verdict
# via agentmail.to. The subject says ✅/❌ so nobody has to open dashboards
# to know whether the morning sweep landed cleanly. See health_check.py.
#
# Must run AFTER the daily refresh sweep, which fires at 09:00 UTC
# (= 05:00 ET, cron-job.org → refresh.yml).
#
# Trigger of record: launchd on Roger's Mac
# (~/Library/LaunchAgents/com.newsweek.yield-health-check.plist, same
# host as the Confiant jobs) dispatching via the locally-authenticated
# gh CLI — no tokens stored anywhere new. Two fires daily, pinned to ET
# like the sweep itself:
#   05:45 ET  morning verdict (45 min behind the sweep; catches and
#             remediates a failed sweep while the morning is young)
#   09:45 ET  follow-up retry ~4h later; quiet when green-with-nothing-
#             to-do (run-history gate in health_check.py)
# Plus RunAtLoad: a boot after a missed fire still dispatches (redundant
# fires are silenced by the run-history gate, so they're free). The
# punctual schedules were moved OFF GitHub-native cron: it drifts hours
# late (observed 6-8h), delaying detection + remediation by the same
# amount, and GitHub auto-disables it after 60 days of repo inactivity.
# cron-job.org (workflow_dispatch + PAT, like refresh.yml) remains a
# fine alternative if the Mac dependency ever becomes a problem.
#
# The single `schedule:` below is a DEAD-MAN FALLBACK, not a trigger of
# record: if launchd fired today, an earlier run already sent the
# verdict and this run stays quiet (run-history gate). If the Mac is off
# all day or gh auth breaks, this becomes the first run of the day and
# the verdict still goes out (late, which is the tell). Without it, a
# dead trigger would mean zero runs and zero emails, and silence reads
# as "all good".
#
# Manual ad-hoc:  gh workflow run health_check.yml

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, run the checks and print but don't send"
        required: false
        type: boolean
        default: false
      remediate:
        description: "Auto re-run the refresh sweep when a remediable check fails"
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "0 18 * * *"   # dead-man fallback — see header comment

permissions:
  contents: read
  actions: write   # read refresh.yml run history + dispatch it for remediation

jobs:
  check:
    runs-on: ubuntu-latest
    # Generous: a remediation re-runs the full sweep (~3-5 min) and waits.
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      # Quieting green re-runs is handled inside health_check.py
      # (_already_verdicted_today): the first successful run of the day
      # always emails the ✅; later green runs are silent. Run-history
      # based — an hour-of-day gate here previously let GitHub cron drift
      # (6-8h observed) push every run past the cutoff, so green days
      # emailed nothing at all.
      - name: Run health checks
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            python health_check.py --dry-run
          else
            python health_check.py
          fi
        env:
          DATABASE_URL:                ${{ secrets.DATABASE_URL }}
          AGENTMAIL_API_KEY:           ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX_ID:          ${{ secrets.AGENTMAIL_INBOX_ID }}
          HEALTH_DIGEST_TO:            ${{ vars.HEALTH_DIGEST_TO }}
          HEALTH_DIGEST_ONLY_FAILURES: ${{ vars.HEALTH_DIGEST_ONLY_FAILURES }}
          HEALTH_AUTO_REMEDIATE:       ${{ inputs.remediate == false && '0' || '1' }}
          GITHUB_TOKEN:                ${{ github.token }}
