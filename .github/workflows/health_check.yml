name: Daily data health check

# Verifies post-sweep data invariants in prod (DV id hygiene + DV↔GAM join
# rate + per-table freshness + sweep liveness) and emails a one-line verdict
# via agentmail.to. The subject says ✅/❌ so nobody has to open dashboards
# to know whether the morning sweep landed cleanly. See health_check.py.
#
# Must run AFTER the daily refresh sweep, which fires at 09:00 UTC
# (= 05:00 ET, cron-job.org → refresh.yml).
#
# Triggered by cron-job.org via workflow_dispatch, same pattern as
# refresh.yml — two daily jobs:
#   09:45 UTC  morning verdict (45 min behind the sweep; catches and
#              remediates a failed sweep while the morning is young)
#   13:45 UTC  follow-up retry ~4h later; quiet when green-with-nothing-
#              to-do — see the "Quiet green follow-up" step
# GitHub-native `schedule:` was deliberately removed: it drifts hours
# late (delaying detection + remediation by the same amount) and GitHub
# auto-disables it after 60 days of repo inactivity.
#
# Manual ad-hoc:  gh workflow run health_check.yml

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, run the checks and print but don't send"
        required: false
        type: boolean
        default: false
      remediate:
        description: "Auto re-run the refresh sweep when a remediable check fails"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  actions: write   # read refresh.yml run history + dispatch it for remediation

jobs:
  check:
    runs-on: ubuntu-latest
    # Generous: a remediation re-runs the full sweep (~3-5 min) and waits.
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Quiet green follow-up runs
        # Runs at/after 12:00 UTC email only failures and remediation
        # outcomes — a clean follow-up re-check shouldn't send a second ✅.
        # Setting repo var HEALTH_DIGEST_ONLY_FAILURES=1 quiets every green
        # email regardless of hour. (10# strips the zero-padding from %H so
        # bash doesn't read 08/09 as bad octal.)
        run: |
          h=$((10#$(date -u +%H)))
          if [[ "${{ vars.HEALTH_DIGEST_ONLY_FAILURES }}" == "1" || $h -ge 12 ]]; then
            echo "HEALTH_DIGEST_ONLY_FAILURES=1" >> "$GITHUB_ENV"
          fi

      - name: Run health checks
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            python health_check.py --dry-run
          else
            python health_check.py
          fi
        env:
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          AGENTMAIL_API_KEY:     ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX_ID:    ${{ secrets.AGENTMAIL_INBOX_ID }}
          HEALTH_DIGEST_TO:      ${{ vars.HEALTH_DIGEST_TO }}
          HEALTH_AUTO_REMEDIATE: ${{ inputs.remediate == false && '0' || '1' }}
          GITHUB_TOKEN:          ${{ github.token }}
