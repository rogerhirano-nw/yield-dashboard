name: Refresh DV (Attention + IVT only)

# Triggered manually for ad-hoc DV-only refreshes or when testing
# agentmail pipeline changes without waiting for the 25-minute full sweep.
# Runs in ~30s (agentmail poll + CSV parse) vs ~25min for the full sweep.
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh-dv:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python refresh_cache.py --mode=dv
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          AGENTMAIL_API_KEY:  ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX_ID: ${{ secrets.AGENTMAIL_INBOX_ID }}

      - name: Check DB (row counts + join coverage)
        run: |
          python - <<'PYEOF'
          import os, re, sqlalchemy
          url = os.environ["DATABASE_URL"]
          engine = sqlalchemy.create_engine(url)
          with engine.connect() as conn:
              for tbl in ("dv_attention", "dv_ivt"):
                  try:
                      n = conn.execute(sqlalchemy.text(f'SELECT COUNT(*) FROM "{tbl}"')).scalar()
                      r = conn.execute(sqlalchemy.text(f'SELECT MIN(date), MAX(date) FROM "{tbl}"')).fetchone()
                      rows = conn.execute(sqlalchemy.text(
                          f'SELECT DISTINCT line_item_name FROM "{tbl}" WHERE line_item_name IS NOT NULL LIMIT 5'
                      )).fetchall()
                      print(f"\n{tbl}: {n} rows | {r[0]} to {r[1]}")
                      for row in rows:
                          print(f"  line_item_name: {row[0]!r}")
                  except Exception as e:
                      print(f"\n{tbl}: ERROR — {e}")

              # DV <-> GAM join coverage: how many DV line_item_names
              # match cleaned gam_campaigns.line_item_name?
              try:
                  dv_count = conn.execute(sqlalchemy.text(
                      "SELECT COUNT(DISTINCT line_item_name) FROM dv_attention"
                      " WHERE line_item_name IS NOT NULL"
                  )).scalar()
                  match_count = conn.execute(sqlalchemy.text(
                      "SELECT COUNT(DISTINCT d.line_item_name)"
                      " FROM dv_attention d"
                      " JOIN gam_campaigns g"
                      "   ON d.line_item_name = regexp_replace(g.line_item_name, '^#[0-9]+ ', '')"
                  )).scalar()
                  print(f"\nDV->GAM join: {match_count} of {dv_count} distinct DV line items match a GAM campaign")
                  if match_count:
                      samples = conn.execute(sqlalchemy.text(
                          "SELECT DISTINCT d.line_item_name, g.order_name"
                          " FROM dv_attention d"
                          " JOIN gam_campaigns g"
                          "   ON d.line_item_name = regexp_replace(g.line_item_name, '^#[0-9]+ ', '')"
                          " LIMIT 5"
                      )).fetchall()
                      for row in samples:
                          print(f"  MATCH: DV {row[0]!r} <-> GAM order {row[1]!r}")
                  else:
                      # Show 5 DV names and 5 cleaned GAM names so we can spot
                      # the mismatch pattern.
                      dv_samples = conn.execute(sqlalchemy.text(
                          "SELECT DISTINCT line_item_name FROM dv_attention"
                          " WHERE line_item_name IS NOT NULL LIMIT 5"
                      )).fetchall()
                      gam_samples = conn.execute(sqlalchemy.text(
                          "SELECT DISTINCT regexp_replace(line_item_name, '^#[0-9]+ ', '') FROM gam_campaigns"
                          " WHERE line_item_name IS NOT NULL LIMIT 5"
                      )).fetchall()
                      print("  No matches. Sample DV names:")
                      for r in dv_samples:
                          print(f"    {r[0]!r}")
                      print("  Sample cleaned GAM names:")
                      for r in gam_samples:
                          print(f"    {r[0]!r}")
              except Exception as e:
                  print(f"\nDV->GAM join check: ERROR — {e}")

              # gam_campaigns recent line items for cross-check
              try:
                  rows = conn.execute(sqlalchemy.text(
                      "SELECT DISTINCT line_item_name FROM gam_campaigns "
                      "WHERE end_date::date >= (NOW() - INTERVAL '30 days')::date LIMIT 5"
                  )).fetchall()
                  print("\ngam_campaigns recent line_item_names (cleaned for DV join):")
                  for row in rows:
                      cleaned = re.sub(r"^#\d+\s+", "", str(row[0]))
                      print(f"  GAM {row[0]!r}")
                      print(f"  ->  {cleaned!r}")
              except Exception as e:
                  print(f"\ngam_campaigns: ERROR — {e}")
          PYEOF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
