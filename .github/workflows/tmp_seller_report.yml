name: Temp seller report
on:
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install sqlalchemy psycopg2-binary
      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'PYEOF'
          import os, sqlalchemy
          from sqlalchemy import text
          engine = sqlalchemy.create_engine(os.environ["DATABASE_URL"])
          with engine.connect() as conn:
              # What order_name values exist now?
              r = conn.execute(text("""
                  SELECT
                      COALESCE(LEFT(order_name, 40), '(null)') as order_pfx,
                      COUNT(*) as n
                  FROM gam_campaigns
                  GROUP BY order_pfx ORDER BY n DESC LIMIT 20
              """))
              print("=== order_name prefixes ===")
              for row in r:
                  print(f"  {row[0]!r}: {row[1]}")

              # What rows match Newsweek_Direct in order_name OR line_item_name?
              r2 = conn.execute(text("""
                  SELECT
                      status,
                      COUNT(*) as n
                  FROM gam_campaigns
                  WHERE order_name LIKE 'Newsweek_Direct%'
                     OR (order_name IS NULL AND line_item_name LIKE 'Newsweek_Direct%')
                  GROUP BY status ORDER BY n DESC
              """))
              print("\n=== statuses for Newsweek_Direct rows ===")
              for row in r2:
                  print(f"  {row[0]!r}: {row[1]}")

              # Total matching rows
              r3 = conn.execute(text("""
                  SELECT COUNT(*) FROM gam_campaigns
                  WHERE order_name LIKE 'Newsweek_Direct%'
                     OR (order_name IS NULL AND line_item_name LIKE 'Newsweek_Direct%')
              """))
              print(f"\nTotal matching rows: {r3.scalar()}")
          PYEOF
