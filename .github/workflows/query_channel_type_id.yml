name: Query Pubmatic channelTypeId

on:
  workflow_dispatch:

jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install sqlalchemy psycopg2-binary
      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'PYEOF'
          import os, sqlalchemy
          from sqlalchemy import text
          engine = sqlalchemy.create_engine(os.environ["DATABASE_URL"])
          with engine.connect() as conn:
              cols = [r[0] for r in conn.execute(text(
                  "SELECT column_name FROM information_schema.columns "
                  "WHERE table_name='pubmatic_deals' ORDER BY ordinal_position"
              )).fetchall()]
              print("Columns:", cols)
              if "deal_type_id" in cols:
                  rows = conn.execute(text(
                      "SELECT deal_type_id, deal_type, COUNT(*) as cnt "
                      "FROM pubmatic_deals GROUP BY deal_type_id, deal_type ORDER BY cnt DESC"
                  )).fetchall()
                  print(f"\n{'ID':<10} {'Name':<30} {'Rows':>8}")
                  print("-" * 50)
                  for r in rows:
                      print(f"{str(r[0]):<10} {str(r[1]):<30} {r[2]:>8}")
              else:
                  print("deal_type_id column not found")
          PYEOF
