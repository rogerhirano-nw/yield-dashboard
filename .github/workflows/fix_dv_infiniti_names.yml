name: Fix DV Infiniti stale names (one-off)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview only, no writes)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
  push:
    branches: [claude/gracious-newton-EMem5]
    paths:
      - 'scripts/fix_dv_infiniti_names.py'
      - '.github/workflows/fix_dv_infiniti_names.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install sqlalchemy psycopg2-binary

      - name: Run fix (dry-run on push, live on workflow_dispatch)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -o pipefail
          DRY="${{ github.event.inputs.dry_run }}"
          # Default to dry-run when triggered by push
          if [ "${{ github.event_name }}" = "push" ] || [ "$DRY" = "true" ]; then
            python scripts/fix_dv_infiniti_names.py --dry-run 2>&1 | tee /tmp/output.txt
          else
            python scripts/fix_dv_infiniti_names.py 2>&1 | tee /tmp/output.txt
          fi

      - name: Post output as PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --head "${{ github.ref_name }}" --state open --json number --jq '.[0].number')
          if [ -z "$PR" ]; then
            echo "No open PR found for branch ${{ github.ref_name }}"; exit 0
          fi
          DRY="${{ github.event.inputs.dry_run }}"
          if [ "${{ github.event_name }}" = "push" ] || [ "$DRY" = "true" ]; then
            LABEL="dry-run preview"
          else
            LABEL="LIVE run"
          fi
          {
            echo "### Fix DV Infiniti stale names — ${LABEL}"
            echo ''
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ''
            echo '```'
            cat /tmp/output.txt
            echo '```'
            echo ''
            echo '_To apply for real: re-run via workflow_dispatch with dry_run=false._'
          } > /tmp/comment.md
          gh pr comment "$PR" --body-file /tmp/comment.md
