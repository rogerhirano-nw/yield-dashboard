name: Test Magnite Deal Source Dimension

on:
  workflow_dispatch:

jobs:
  query:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Test revenue_source and marketplace dimensions
        env:
          MAGNITE_KEY:          ${{ secrets.MAGNITE_KEY }}
          MAGNITE_SECRET:       ${{ secrets.MAGNITE_SECRET }}
          MAGNITE_PUBLISHER_ID: ${{ secrets.MAGNITE_PUBLISHER_ID }}
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'PYEOF'
          import os
          from client import MagniteClient

          client = MagniteClient(
              api_key=os.environ["MAGNITE_KEY"],
              api_secret=os.environ["MAGNITE_SECRET"],
              account_id=os.environ["MAGNITE_PUBLISHER_ID"],
          )

          candidates = ["revenue_source", "marketplace", "marketplace_vendor", "marketplace_id"]

          for dim in candidates:
              try:
                  df = client.run_report(
                      dimensions=["deal", dim],
                      metrics=["paid_impression"],
                      date_range="yesterday",
                  )
                  if df.empty:
                      print(f"\n'{dim}' accepted but returned 0 rows")
                  else:
                      print(f"\n✓ '{dim}' WORKS — unique values: {sorted(df[dim].dropna().unique().tolist())}")
                      print(f"  Sample rows:\n{df[['deal', dim]].head(5).to_string()}")
              except Exception as e:
                  print(f"\n✗ '{dim}' failed: {e}")
          PYEOF
