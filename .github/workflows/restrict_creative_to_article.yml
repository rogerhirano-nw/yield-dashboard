name: Restrict GAM creative to one article

on:
  workflow_dispatch:
    inputs:
      line_item_id:
        description: "GAM line item id"
        required: true
        default: "7309466805"
      creative_id:
        description: "GAM creative id (must be associated with the line item)"
        required: true
        default: "138557893457"
      article_id:
        description: "newsweek entityId — trailing number in the article URL"
        required: true
        default: "12010430"
      apply:
        description: "Write to GAM (false = dry-run)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read
  pull-requests: write

jobs:
  restrict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install googleads

      - name: Run
        env:
          GAM_SERVICE_ACCOUNT_JSON: ${{ secrets.GAM_SERVICE_ACCOUNT_JSON }}
          GAM_NETWORK_ID: ${{ secrets.GAM_NETWORK_ID }}
        run: |
          set -o pipefail
          ARGS="--line-item-id ${{ github.event.inputs.line_item_id }}"
          ARGS="$ARGS --creative-id ${{ github.event.inputs.creative_id }}"
          ARGS="$ARGS --article-id ${{ github.event.inputs.article_id }}"
          if [ "${{ github.event.inputs.apply }}" = "true" ]; then
            ARGS="$ARGS --apply"
          fi
          python scripts/restrict_creative_to_article.py $ARGS 2>&1 | tee /tmp/output.txt

      - name: Post output as PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --head "${{ github.ref_name }}" --state open --json number --jq '.[0].number')
          if [ -z "$PR" ]; then
            echo "No open PR for branch ${{ github.ref_name }} — skipping comment"; exit 0
          fi
          {
            echo "### Restrict creative to article"
            echo ""
            echo "LI \`${{ github.event.inputs.line_item_id }}\` / creative \`${{ github.event.inputs.creative_id }}\` → article \`${{ github.event.inputs.article_id }}\`  |  apply: \`${{ github.event.inputs.apply }}\`"
            echo ""
            echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo '```'
            cat /tmp/output.txt
            echo '```'
          } > /tmp/comment.md
          gh pr comment "$PR" --body-file /tmp/comment.md
