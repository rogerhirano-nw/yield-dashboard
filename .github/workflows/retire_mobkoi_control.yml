name: Retire Mobkoi control LICA

on:
  # bootstrap: registers the workflow and runs the dry-run (inputs empty
  # on push => APPLY false). Remove after first use if it gets noisy.
  push:
    branches: [claude/wonderful-pascal-p3737t]
    paths:
      - 'scripts/retire_mobkoi_control_lica.py'
  workflow_dispatch:
    inputs:
      retire_pairs:
        description: 'Comma-separated lineItemId:creativeId associations to deactivate'
        required: false
        default: '7310815861:138557481462'
      apply:
        description: 'Set "true" to write to GAM (default is dry-run)'
        required: false
        default: 'false'

permissions:
  contents: read
  pull-requests: write

jobs:
  retire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: pip install google-ads-admanager google-auth pandas googleads

      - name: Retire LICA
        env:
          GAM_SERVICE_ACCOUNT_JSON: ${{ secrets.GAM_SERVICE_ACCOUNT_JSON }}
          GAM_NETWORK_ID: ${{ secrets.GAM_NETWORK_ID }}
          RETIRE_PAIRS: ${{ inputs.retire_pairs }}
          APPLY: ${{ inputs.apply }}
        run: |
          set -o pipefail
          python scripts/retire_mobkoi_control_lica.py 2>&1 | tee /tmp/output.txt

      - name: Post output as PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --head "${{ github.ref_name }}" --state open --json number --jq '.[0].number')
          if [ -z "$PR" ]; then
            echo "No open PR found for branch ${{ github.ref_name }}"; exit 0
          fi
          {
            echo '### Retire Mobkoi control LICA'
            echo ''
            echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ''
            echo '```'
            tail -c 58000 /tmp/output.txt
            echo '```'
          } > /tmp/comment.md
          gh pr comment "$PR" --body-file /tmp/comment.md
