name: Refresh Magnite cache

# Triggered externally by cron-job.org via the GitHub API
# (POST /repos/<owner>/<repo>/actions/workflows/refresh.yml/dispatches)
# at 05:00 America/New_York. workflow_dispatch fires within seconds of
# the API call — unlike GitHub's native `schedule:` cron which was
# drifting 8+ hours late because top-of-hour scheduled runs get
# deprioritized during system-wide load spikes.
#
# Same pattern used by rogerhirano-nw/apple-news/daily-report.yml.
# Manual `gh workflow run refresh.yml` still works for ad-hoc runs.
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python refresh_cache.py
        env:
          MAGNITE_KEY:                ${{ secrets.MAGNITE_KEY }}
          MAGNITE_SECRET:             ${{ secrets.MAGNITE_SECRET }}
          MAGNITE_PUBLISHER_ID:       ${{ secrets.MAGNITE_PUBLISHER_ID }}
          DATABASE_URL:               ${{ secrets.DATABASE_URL }}
          GAM_NETWORK_ID:             ${{ secrets.GAM_NETWORK_ID }}
          GAM_SERVICE_ACCOUNT_JSON:   ${{ secrets.GAM_SERVICE_ACCOUNT_JSON }}
          PUBMATIC_PUBLISHER_ID:      ${{ secrets.PUBMATIC_PUBLISHER_ID }}
          PUBMATIC_TOKEN:             ${{ secrets.PUBMATIC_TOKEN }}
          PUBMATIC_REFRESH_TOKEN:     ${{ secrets.PUBMATIC_REFRESH_TOKEN }}
          PUBMATIC_EMAIL:             ${{ secrets.PUBMATIC_EMAIL }}
          OPENSINCERA_TOKEN:          ${{ secrets.OPENSINCERA_TOKEN }}
          AGENTMAIL_API_KEY:          ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX_ID:         ${{ secrets.AGENTMAIL_INBOX_ID }}
