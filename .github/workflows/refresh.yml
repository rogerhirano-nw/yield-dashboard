name: Refresh Magnite cache

on:
  schedule:
    # Offbeat minute on purpose: top-of-hour scheduled runs on GitHub
    # Actions get heavily deprioritized during the load spike at :00,
    # and were drifting ~8h late (firing ~17 UTC instead of 09 UTC).
    # 9:17 UTC = 5:17 AM ET, off the bottleneck, much closer to SLA.
    - cron: '17 9 * * *'
  workflow_dispatch:        # lets you trigger manually from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python refresh_cache.py
        env:
          MAGNITE_KEY:                ${{ secrets.MAGNITE_KEY }}
          MAGNITE_SECRET:             ${{ secrets.MAGNITE_SECRET }}
          MAGNITE_PUBLISHER_ID:       ${{ secrets.MAGNITE_PUBLISHER_ID }}
          DATABASE_URL:               ${{ secrets.DATABASE_URL }}
          GAM_NETWORK_ID:             ${{ secrets.GAM_NETWORK_ID }}
          GAM_SERVICE_ACCOUNT_JSON:   ${{ secrets.GAM_SERVICE_ACCOUNT_JSON }}
          PUBMATIC_PUBLISHER_ID:      ${{ secrets.PUBMATIC_PUBLISHER_ID }}
          PUBMATIC_TOKEN:             ${{ secrets.PUBMATIC_TOKEN }}
          PUBMATIC_REFRESH_TOKEN:     ${{ secrets.PUBMATIC_REFRESH_TOKEN }}
          PUBMATIC_EMAIL:             ${{ secrets.PUBMATIC_EMAIL }}
