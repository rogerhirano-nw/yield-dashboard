name: Pull Index OB Ad Requests (one-off)

on:
  workflow_dispatch:
  push:
    branches: [claude/fervent-hawking-nZ2eZ]
    paths:
      - 'scripts/pull_index_ob_requests.py'
      - '.github/workflows/pull_index_ob_requests.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: pip install google-ads-admanager google-auth pandas

      - name: Run pull
        env:
          GAM_SERVICE_ACCOUNT_JSON: ${{ secrets.GAM_SERVICE_ACCOUNT_JSON }}
          GAM_NETWORK_ID: ${{ secrets.GAM_NETWORK_ID }}
        run: |
          set -o pipefail
          python scripts/pull_index_ob_requests.py 2>&1 | tee /tmp/output.txt

      - name: Post output as PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --head "${{ github.ref_name }}" --state open --json number --jq '.[0].number')
          if [ -z "$PR" ]; then
            echo "No open PR found for branch ${{ github.ref_name }}"; exit 0
          fi
          {
            echo '### Index Exchange — Open Bidding ad requests'
            echo ''
            echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ''
            echo '```'
            cat /tmp/output.txt
            echo '```'
          } > /tmp/comment.md
          gh pr comment "$PR" --body-file /tmp/comment.md
