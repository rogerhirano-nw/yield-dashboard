name: Weekly deal health report

on:
  schedule:
    - cron: '0 13 * * 1'   # every Monday 9 AM ET (13:00 UTC)
  workflow_dispatch:        # manual trigger for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python weekly_report.py
        env:
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          AGENTMAIL_API_KEY:     ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX_ID:    ${{ secrets.AGENTMAIL_INBOX_ID }}
          REPORT_TO_EMAIL:       ${{ secrets.REPORT_TO_EMAIL }}
