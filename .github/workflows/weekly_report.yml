name: Weekly deal health report

on:
  schedule:
    # Wednesday 9 AM ET (= 13:00 UTC in EDT; drifts to 8 AM in EST winter).
    - cron: '0 13 * * 3'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write         # required for the in-workflow git push of the CSV

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      # 1. Generate the HTML email + redacted CSV, commit + push the CSV.
      - name: Generate report and publish CSV
        run: |
          python -m deal_health \
            --output-dir reports \
            --report-date "$(date -u +%F)"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GH_ORG_REPO:  ${{ github.repository }}
          GH_BRANCH:    ${{ github.ref_name }}
          REPORTS_PATH: reports
          PUBLIC_SAFE:  "true"

      # 2. Send via AgentMail (Roger's existing setup).
      #    Recipients are listed here in the YAML — not a secret — because
      #    they're internal work addresses, easy for ops to edit, and putting
      #    them in plaintext makes the distribution list auditable in git.
      - name: Send email (AgentMail)
        run: |
          python - <<'PY'
          import os
          from datetime import date
          from pathlib import Path
          from agentmail import AgentMail

          report_date = date.today().isoformat()
          html_path = Path(f"reports/weekly_deal_health_{report_date}.html")
          if not html_path.exists():
              print(f"No HTML generated at {html_path} — nothing to send. Skipping.")
              raise SystemExit(0)
          html = html_path.read_text(encoding="utf-8")

          recipients = [r.strip() for r in os.environ["REPORT_RECIPIENTS"].split(",") if r.strip()]

          client = AgentMail(api_key=os.environ["AGENTMAIL_API_KEY"])
          inbox_id = os.environ["AGENTMAIL_INBOX_ID"]
          subject = f"Weekly Deal Health — {date.today().strftime('%b %d, %Y')}"

          # One message per recipient. Some mail providers strip multi-To/Cc
          # when the sender is an inbox-style integration; one-at-a-time keeps
          # delivery predictable and lets us log failures per recipient.
          for to in recipients:
              client.inboxes.messages.send(
                  inbox_id,
                  to=to,
                  subject=subject,
                  html=html,
              )
              print(f"sent to {to}")
          print(f"done — {len(recipients)} recipient(s)")
          PY
        env:
          AGENTMAIL_API_KEY:  ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX_ID: ${{ secrets.AGENTMAIL_INBOX_ID }}
          REPORT_RECIPIENTS: >-
            am@newsweek.com,
            adops@newsweek.com,
            revops@newsweek.com,
            r.shore@newsweek.com,
            b.karetny@newsweek.com,
            d.varvaro@newsweek.com
