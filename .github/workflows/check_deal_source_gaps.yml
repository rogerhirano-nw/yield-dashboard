name: Check Deal Source gaps

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Diagnose missing revenue_source
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'PYEOF'
          import os
          import sqlalchemy
          from sqlalchemy import text

          engine = sqlalchemy.create_engine(os.environ["DATABASE_URL"])
          with engine.connect() as conn:
              # How many deal_ids in daily have no match in demand?
              r = conn.execute(text("""
                  SELECT COUNT(DISTINCT d.deal_id) AS unmatched
                  FROM magnite_deal_daily d
                  LEFT JOIN (SELECT DISTINCT deal_id FROM magnite_deal_demand) dem
                    ON d.deal_id = dem.deal_id
                  WHERE dem.deal_id IS NULL AND d.deal_id IS NOT NULL
              """))
              print("deal_ids in daily with NO match in demand:", r.fetchone()[0])

              # Show unmatched deal names
              r2 = conn.execute(text("""
                  SELECT DISTINCT d.deal_id, d.deal
                  FROM magnite_deal_daily d
                  LEFT JOIN (SELECT DISTINCT deal_id FROM magnite_deal_demand) dem
                    ON d.deal_id = dem.deal_id
                  WHERE dem.deal_id IS NULL
                  LIMIT 20
              """))
              print("\nSample unmatched deals:")
              for row in r2:
                  print(dict(row._mapping))

              # Distinct revenue_source values in demand table
              r3 = conn.execute(text("""
                  SELECT revenue_source, COUNT(DISTINCT deal_id) AS deals
                  FROM magnite_deal_demand
                  GROUP BY revenue_source ORDER BY deals DESC
              """))
              print("\nRevenue_source distribution in magnite_deal_demand:")
              for row in r3:
                  print(dict(row._mapping))

              # Are deal_id types consistent? (NULL deal_ids?)
              r4 = conn.execute(text("""
                  SELECT
                    COUNT(*) AS total_rows,
                    COUNT(deal_id) AS non_null_deal_id,
                    COUNT(DISTINCT deal_id) AS distinct_deal_ids
                  FROM magnite_deal_daily
              """))
              print("\nmagnite_deal_daily stats:")
              print(dict(r4.fetchone()._mapping))

              r5 = conn.execute(text("""
                  SELECT
                    COUNT(*) AS total_rows,
                    COUNT(deal_id) AS non_null_deal_id,
                    COUNT(DISTINCT deal_id) AS distinct_deal_ids
                  FROM magnite_deal_demand
              """))
              print("\nmagnite_deal_demand stats:")
              print(dict(r5.fetchone()._mapping))
          PYEOF
