name: Temp validate PA via correct metrics (full dim set)
on:
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - env:
          GAM_NETWORK_ID:           ${{ secrets.GAM_NETWORK_ID }}
          GAM_SERVICE_ACCOUNT_JSON: ${{ secrets.GAM_SERVICE_ACCOUNT_JSON }}
        run: |
          python - <<'PYEOF'
          # Confirm the production deals-report dimensions (DATE, ORDER_NAME,
          # DEAL_NAME, DEAL_BUYER_NAME, INVENTORY_FORMAT_NAME,
          # PROGRAMMATIC_CHANNEL_NAME) work with the programmatic metric set
          # (IMPRESSIONS, REVENUE_WITHOUT_CPD, CTR, CLICKS). If yes, ship it.
          import traceback
          from datetime import date, timedelta
          from gam_client import GAMClient

          gam = GAMClient()
          yesterday = date.today() - timedelta(days=1)
          start = yesterday - timedelta(days=6)
          try:
              df = gam._run_report(
                  dimensions=["DATE", "ORDER_NAME", "DEAL_NAME",
                              "DEAL_BUYER_NAME", "INVENTORY_FORMAT_NAME",
                              "PROGRAMMATIC_CHANNEL_NAME"],
                  metrics=["IMPRESSIONS", "REVENUE_WITHOUT_CPD", "CTR", "CLICKS"],
                  start_date=start,
                  end_date=yesterday,
              )
              print(f"total rows: {len(df)}")
              print(f"columns:    {list(df.columns)}")
              print()
              print("=== channel distribution ===")
              ch = "programmatic_channel_name"
              print(df[ch].fillna("(empty)").value_counts().to_string())
              print()
              print("=== PA rows summary (last 7 days) ===")
              pa = df[df[ch].fillna("").str.contains("Private Auction", case=False, na=False)]
              print(f"  total PA rows: {len(pa)}")
              if not pa.empty:
                  print(f"  unique PA deals: {pa['deal_name'].nunique()}")
                  print(f"  total PA impressions: {pa['impressions'].sum()}")
                  print(f"  total PA revenue: ${pa['revenue_without_cpd'].sum():.2f}")
                  print()
                  print("  sample rows:")
                  print(pa.head(5).to_string())
          except Exception:
              traceback.print_exc()
          PYEOF
