name: Temp validate PA via correct metrics
on:
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - env:
          GAM_NETWORK_ID:           ${{ secrets.GAM_NETWORK_ID }}
          GAM_SERVICE_ACCOUNT_JSON: ${{ secrets.GAM_SERVICE_ACCOUNT_JSON }}
        run: |
          python - <<'PYEOF'
          # Replicate the user's GAM UI report via the API. The UI report uses
          # Programmatic / AdX metrics (IMPRESSIONS, REVENUE_WITHOUT_CPD) — not
          # AD_SERVER_* — which is why my earlier API calls missed all PA rows.
          # If this matches the user's CSV (Ford-Always-On = $2.21 / 433 imps
          # on 2026-05-16) we have the metric set to use in production.
          import json, traceback
          from datetime import date
          from gam_client import GAMClient

          gam = GAMClient()
          target = date(2026, 5, 16)
          try:
              df = gam._run_report(
                  dimensions=["PROGRAMMATIC_CHANNEL_NAME", "DEAL_NAME",
                              "BUYER_NETWORK_NAME", "DATE"],
                  metrics=["IMPRESSIONS", "REVENUE_WITHOUT_CPD", "CTR", "CLICKS"],
                  start_date=target,
                  end_date=target,
              )
              print(f"total rows: {len(df)}")
              print(f"columns:    {list(df.columns)}")
              print()
              print("=== channel distribution ===")
              ch = "programmatic_channel_name"
              if ch in df.columns:
                  print(df[ch].fillna("(null)").value_counts().to_string())
              print()
              print("=== Private Auction rows for 2026-05-16 ===")
              pa = df[df.get(ch, "").fillna("").str.contains("Private Auction", case=False, na=False)] if ch in df.columns else df.iloc[0:0]
              print(f"  PA rows: {len(pa)}")
              if not pa.empty:
                  for _, r in pa.iterrows():
                      print(f"   {r.get('date')} | {r.get('deal_name')[:80]:<80} | imp={r.get('impressions')} rev=${r.get('revenue_without_cpd')}")
              print()
              print("=== Ford-Always-On match ===")
              ford = pa[pa["deal_name"].fillna("").str.contains("Ford-Always-On", case=False, na=False)] if "deal_name" in pa.columns else pa
              for _, r in ford.iterrows():
                  print(f"  {r.to_dict()}")
          except Exception:
              traceback.print_exc()
          PYEOF
