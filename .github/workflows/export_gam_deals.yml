name: Export GAM Deals CSV

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Export all GAM deals to CSV
        env:
          GAM_SERVICE_ACCOUNT_JSON: ${{ secrets.GAM_SERVICE_ACCOUNT_JSON }}
          GAM_NETWORK_ID: ${{ secrets.GAM_NETWORK_ID }}
        run: |
          python - <<'PYEOF'
          from datetime import date, timedelta
          import pandas as pd
          from gam_client import GAMClient

          gam = GAMClient()
          yesterday       = date.today() - timedelta(days=1)
          thirty_days_ago = yesterday - timedelta(days=29)

          # ── Pull 1: PD/PG via DEAL_ID + DEAL_NAME ────────────────────
          df_deals = gam._run_report(
              dimensions=["DATE", "DEAL_ID", "DEAL_NAME", "PROGRAMMATIC_CHANNEL_NAME"],
              metrics=["AD_SERVER_IMPRESSIONS", "AD_SERVER_REVENUE", "AD_SERVER_AVERAGE_ECPM"],
              start_date=thirty_days_ago,
              end_date=yesterday,
          )
          print(f"Pull 1 (DEAL_ID+DEAL_NAME): {len(df_deals)} rows")
          print(f"  Channels: {df_deals['programmatic_channel_name'].value_counts().to_dict()}")

          # ── Pull 2: PA via ORDER_NAME + DEAL_NAME ────────────────────
          df_pa = gam._run_report(
              dimensions=["DATE", "ORDER_NAME", "DEAL_NAME", "PROGRAMMATIC_CHANNEL_NAME"],
              metrics=["AD_SERVER_IMPRESSIONS", "AD_SERVER_REVENUE", "AD_SERVER_AVERAGE_ECPM"],
              start_date=thirty_days_ago,
              end_date=yesterday,
          )
          print(f"\nPull 2 (ORDER_NAME+DEAL_NAME): {len(df_pa)} rows")
          print(f"  Channels: {df_pa['programmatic_channel_name'].value_counts().to_dict()}")

          pa_only = df_pa[df_pa['programmatic_channel_name'].astype(str).str.contains('rivate', case=False, na=False)]
          print(f"  Rows containing 'rivate' in channel: {len(pa_only)}")
          if not pa_only.empty:
              print(pa_only[['programmatic_channel_name','order_name','deal_name','ad_server_impressions','ad_server_revenue']].to_string())

          # ── Pull 3: All channels by order to find where PA revenue hides ──
          df_order_ch = gam._run_report(
              dimensions=["ORDER_NAME", "PROGRAMMATIC_CHANNEL_NAME"],
              metrics=["AD_SERVER_IMPRESSIONS", "AD_SERVER_REVENUE"],
              start_date=thirty_days_ago,
              end_date=yesterday,
          )
          oe = df_order_ch[df_order_ch['order_name'].astype(str).str.contains('OpenExchange|Exchange|Open', case=False, na=False)]
          print(f"\nPull 3 — OpenExchange order by channel:\n{oe.to_string()}")

          # Write everything to CSVs
          df_deals.to_csv("gam_deals_deal_id.csv", index=False)
          df_pa.to_csv("gam_deals_order_name.csv", index=False)
          df_order_ch.to_csv("gam_order_channel.csv", index=False)
          print("\nWrote all CSVs.")
          PYEOF

      - name: Upload CSVs as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gam-deals-export-v2
          path: |
            gam_deals_deal_id.csv
            gam_deals_order_name.csv
            gam_order_channel.csv
          retention-days: 7
