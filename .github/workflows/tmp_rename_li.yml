name: Temp rename line items
on:
  workflow_dispatch:
jobs:
  rename:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install googleads
      - env:
          GAM_NETWORK_ID:           ${{ secrets.GAM_NETWORK_ID }}
          GAM_SERVICE_ACCOUNT_JSON: ${{ secrets.GAM_SERVICE_ACCOUNT_JSON }}
        run: |
          python - <<'PYEOF'
          import os, json, re, tempfile
          from googleads import ad_manager, oauth2

          key_data = json.loads(os.environ["GAM_SERVICE_ACCOUNT_JSON"])
          network_code = os.environ["GAM_NETWORK_ID"]
          ORDER_ID = 4057788230

          with tempfile.NamedTemporaryFile(mode='w', suffix='.json', delete=False) as f:
              json.dump(key_data, f)
              key_file = f.name

          oauth2_client = oauth2.GoogleServiceAccountClient(
              key_file,
              "https://www.googleapis.com/auth/dfp"
          )
          client = ad_manager.AdManagerClient(
              oauth2_client, "NWRenamer/1.0", network_code=network_code
          )
          li_service = client.GetService("LineItemService", version="v202605")

          sb = ad_manager.StatementBuilder()
          sb.Where("orderId = :orderId")
          sb.WithBindVariable("orderId", ORDER_ID)

          all_lis = []
          while True:
              resp = li_service.getLineItemsByStatement(sb.ToStatement())
              if not hasattr(resp, "results") or not resp.results:
                  break
              all_lis.extend(resp.results)
              sb.offset += sb.limit
              if sb.offset >= resp.totalResultSetSize:
                  break

          print(f"Found {len(all_lis)} total line items in order {ORDER_ID}.")

          to_update = []
          for li in all_lis:
              old_name = li.name or ""
              if "Infinity" not in old_name and "infinity" not in old_name:
                  continue
              new_name = re.sub(r"Infinity", "Infiniti", old_name).replace("infinity", "infiniti")
              li.name = new_name
              to_update.append((old_name, new_name, li))

          if not to_update:
              print("\nNo line items found with 'Infinity' in the name.")
          else:
              print(f"Renaming {len(to_update)} items one by one...")
              renamed, failed = [], []
              for old_name, new_name, li in to_update:
                  try:
                      li_service.updateLineItems([li])
                      renamed.append(new_name)
                      print(f"OK: {old_name!r} -> {new_name!r}")
                  except Exception as e:
                      failed.append(old_name)
                      print(f"FAIL: {old_name!r}: {str(e)[:200]}")
              print(f"\nDone. Renamed {len(renamed)}, failed {len(failed)}.")
          PYEOF
