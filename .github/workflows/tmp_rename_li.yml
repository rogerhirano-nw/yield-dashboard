name: Temp rename line items
on:
  workflow_dispatch:
jobs:
  rename:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install google-ads-admanager google-auth requests
      - env:
          GAM_NETWORK_ID:           ${{ secrets.GAM_NETWORK_ID }}
          GAM_SERVICE_ACCOUNT_JSON: ${{ secrets.GAM_SERVICE_ACCOUNT_JSON }}
        run: |
          python - <<'PYEOF'
          import os, json, re
          import requests
          from google.oauth2 import service_account
          from google.auth.transport.requests import AuthorizedSession
          from google.ads import admanager_v1

          creds = service_account.Credentials.from_service_account_info(
              json.loads(os.environ["GAM_SERVICE_ACCOUNT_JSON"]),
              scopes=["https://www.googleapis.com/auth/admanager"],
          )
          network_id = os.environ["GAM_NETWORK_ID"]
          session = AuthorizedSession(creds)
          BASE = "https://admanager.googleapis.com/v1"

          client = admanager_v1.LineItemServiceClient(credentials=creds)
          parent = f"networks/{network_id}"
          order_resource = f"networks/{network_id}/orders/4057788230"

          renamed = []
          skipped = []
          for li in client.list_line_items(
              admanager_v1.ListLineItemsRequest(
                  parent=parent,
                  filter=f'order = "{order_resource}"',
              )
          ):
              old_name = li.display_name or ""
              if "Infinity" not in old_name and "infinity" not in old_name:
                  skipped.append(old_name)
                  continue
              new_name = re.sub(r"Infinity", "Infiniti", old_name).replace("infinity", "infiniti")
              resp = session.patch(
                  f"{BASE}/{li.name}",
                  params={"updateMask": "displayName"},
                  json={"displayName": new_name},
              )
              if resp.ok:
                  renamed.append((old_name, new_name))
                  print(f"RENAMED: {old_name!r} -> {new_name!r}")
              else:
                  print(f"ERROR {resp.status_code} on {li.name}: {resp.text[:200]}")

          print(f"\nDone. Renamed {len(renamed)}, skipped {len(skipped)} (no match).")
          PYEOF
