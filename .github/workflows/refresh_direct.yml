name: Refresh GAM direct campaigns

# Direct-only refresh: runs refresh_gam() (gam_campaigns) plus, when
# GAM_HOURLY_LINE_ITEMS is set, refresh_gam_hourly() (gam_campaigns_hourly).
#
# Used for intra-day fires so direct-campaign delivery and hourly cap-tracker
# data stay current without re-pulling the slower Magnite/Pubmatic/PMP feeds.
#
# The 5 AM ET daily full sweep still happens via refresh.yml.
#
# Triggered externally by cron-job.org at 10:30, 13:30, 16:30, 19:30
# America/New_York Mon–Fri so each 3-hourly cap-digest run has data
# ≤ 30 minutes old.
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh-direct:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Refresh gam_campaigns (daily Nd snapshots)
        run: python refresh_cache.py --mode=direct
        env:
          DATABASE_URL:               ${{ secrets.DATABASE_URL }}
          GAM_NETWORK_ID:             ${{ secrets.GAM_NETWORK_ID }}
          GAM_SERVICE_ACCOUNT_JSON:   ${{ secrets.GAM_SERVICE_ACCOUNT_JSON }}

      - name: Refresh gam_campaigns_hourly (today's hourly breakdown for capped LIs)
        if: vars.GAM_HOURLY_LINE_ITEMS != ''
        run: python refresh_cache.py --mode=gam_hourly
        env:
          DATABASE_URL:               ${{ secrets.DATABASE_URL }}
          GAM_NETWORK_ID:             ${{ secrets.GAM_NETWORK_ID }}
          GAM_SERVICE_ACCOUNT_JSON:   ${{ secrets.GAM_SERVICE_ACCOUNT_JSON }}
          GAM_HOURLY_LINE_ITEMS:      ${{ vars.GAM_HOURLY_LINE_ITEMS }}
