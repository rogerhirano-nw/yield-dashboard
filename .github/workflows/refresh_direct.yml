name: Refresh GAM direct campaigns

# Direct-only refresh: runs ONLY refresh_gam() (writes to gam_campaigns).
# Skips Magnite, Pubmatic, IX, GAM PMP/PA/PD deals, Creatives, LICA, etc.
# Used for the intra-day fires (11 AM + 3 PM ET) so direct-campaign
# delivery on the dashboard stays current without re-pulling the full
# set of slow SSP feeds.
#
# The 5 AM ET daily full sweep still happens via refresh.yml.
#
# Triggered externally by cron-job.org via the GitHub API
# (POST /repos/<owner>/<repo>/actions/workflows/refresh_direct.yml/dispatches)
# at 11:00 AND 15:00 America/New_York. Manual `gh workflow run` also works.
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh-direct:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python refresh_cache.py --mode=direct
        env:
          # Only GAM-related secrets — the direct path doesn't touch
          # Magnite or Pubmatic at all, but DATABASE_URL is still needed
          # to write the gam_campaigns rows.
          DATABASE_URL:               ${{ secrets.DATABASE_URL }}
          GAM_NETWORK_ID:             ${{ secrets.GAM_NETWORK_ID }}
          GAM_SERVICE_ACCOUNT_JSON:   ${{ secrets.GAM_SERVICE_ACCOUNT_JSON }}
