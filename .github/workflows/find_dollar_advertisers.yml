name: Find $-prefixed advertisers (one-off)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/find_dollar_advertisers.py'
      - '.github/workflows/find_dollar_advertisers.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  query:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install sqlalchemy psycopg2-binary

      - name: Run query
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -o pipefail
          python scripts/find_dollar_advertisers.py 2>&1 | tee /tmp/output.txt

      - name: Post output as PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo '### `$6` advertiser investigation'
            echo ''
            echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ''
            echo '```'
            cat /tmp/output.txt
            echo '```'
          } > /tmp/comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/comment.md
