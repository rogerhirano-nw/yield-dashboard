name: Diagnose Infiniti DV mismatch (one-off)

on:
  workflow_dispatch:
  push:
    branches: [claude/gracious-newton-EMem5]
    paths:
      - 'scripts/diagnose_infiniti_dv_mismatch.py'
      - '.github/workflows/diagnose_infiniti_dv.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install sqlalchemy psycopg2-binary

      - name: Run diagnostic
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -o pipefail
          python scripts/diagnose_infiniti_dv_mismatch.py 2>&1 | tee /tmp/output.txt

      - name: Post output as PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --head "${{ github.ref_name }}" --state open --json number --jq '.[0].number')
          if [ -z "$PR" ]; then
            echo "No open PR found for branch ${{ github.ref_name }}"; exit 0
          fi
          {
            echo '### Infiniti DV↔GAM name mismatch diagnostic'
            echo ''
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ''
            echo '```'
            cat /tmp/output.txt
            echo '```'
          } > /tmp/comment.md
          gh pr comment "$PR" --body-file /tmp/comment.md
