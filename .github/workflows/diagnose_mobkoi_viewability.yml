name: Diagnose Mobkoi viewability (one-off)

on:
  workflow_dispatch:
  push:
    branches: [claude/wonderful-pascal-p3737t]
    paths:
      - 'scripts/diagnose_mobkoi_viewability.py'
      - '.github/workflows/diagnose_mobkoi_viewability.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: pip install google-ads-admanager google-auth pandas googleads

      - name: Run diagnosis
        env:
          GAM_SERVICE_ACCOUNT_JSON: ${{ secrets.GAM_SERVICE_ACCOUNT_JSON }}
          GAM_NETWORK_ID: ${{ secrets.GAM_NETWORK_ID }}
        run: |
          set -o pipefail
          python scripts/diagnose_mobkoi_viewability.py 2>&1 | tee /tmp/output.txt

      - name: Post output as PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --head "${{ github.ref_name }}" --state open --json number --jq '.[0].number')
          if [ -z "$PR" ]; then
            echo "No open PR found for branch ${{ github.ref_name }}"; exit 0
          fi
          {
            echo '### Mobkoi interscroller/uniscroller — GAM viewability diagnosis'
            echo ''
            echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ''
            echo '```'
            tail -c 60000 /tmp/output.txt
            echo '```'
          } > /tmp/comment.md
          gh pr comment "$PR" --body-file /tmp/comment.md
