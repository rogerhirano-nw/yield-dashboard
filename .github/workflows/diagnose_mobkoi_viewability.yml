name: Diagnose Mobkoi viewability (one-off)

on:
  workflow_dispatch:
    inputs:
      line_item_ids:
        description: 'Comma-separated GAM line item IDs to diagnose'
        required: false
        default: '7310815861,7313011338,7316916920'
      lookback_max_days:
        description: 'Cap the report lookback (days before yesterday)'
        required: false
        default: '45'
  # Temporary: daily pull while the declared-view watcher test runs on the
  # live Mobkoi flights (creative 138562143597 on LI 7310815861, added
  # 2026-06-11). Posts the per-creative AV table to the open PR. Remove
  # this block once the flights end (~2026-06-16) or monitoring is done.
  schedule:
    - cron: '30 14 * * *'

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: pip install google-ads-admanager google-auth pandas googleads

      - name: Run diagnosis
        env:
          GAM_SERVICE_ACCOUNT_JSON: ${{ secrets.GAM_SERVICE_ACCOUNT_JSON }}
          GAM_NETWORK_ID: ${{ secrets.GAM_NETWORK_ID }}
          MOBKOI_LI_IDS: ${{ inputs.line_item_ids }}
          LOOKBACK_MAX_DAYS: ${{ inputs.lookback_max_days }}
        run: |
          set -o pipefail
          python scripts/diagnose_mobkoi_viewability.py 2>&1 | tee /tmp/output.txt

      - name: Post output as PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --head "${{ github.ref_name }}" --state open --json number --jq '.[0].number')
          if [ -z "$PR" ]; then
            echo "No open PR found for branch ${{ github.ref_name }}"; exit 0
          fi
          {
            echo '### Mobkoi interscroller/uniscroller — GAM viewability diagnosis'
            echo ''
            echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ''
            echo '```'
            tail -c 60000 /tmp/output.txt
            echo '```'
          } > /tmp/comment.md
          gh pr comment "$PR" --body-file /tmp/comment.md
