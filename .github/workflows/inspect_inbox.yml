name: Inspect forwarded inbox email (agentmail)

# Cloud sessions hold no agentmail creds, so this reads the newsweek@agentmail.to
# inbox here with the AGENTMAIL secrets (same pattern as the DV pull / health
# check). Branch push runs it and posts the ad-markup inspection to the PR.

on:
  workflow_dispatch:
  push:
    branches: [claude/awesome-cannon-rnskoi]
    paths:
      - 'scripts/inspect_inbox_email.py'
      - '.github/workflows/inspect_inbox.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Inspect inbox
        env:
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX_ID: ${{ secrets.AGENTMAIL_INBOX_ID }}
        run: |
          set -o pipefail
          python scripts/inspect_inbox_email.py 2>&1 | tee /tmp/output.txt

      - name: Post output as PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --head "${{ github.ref_name }}" --state open --json number --jq '.[0].number')
          if [ -z "$PR" ]; then echo "No open PR for ${{ github.ref_name }}"; exit 0; fi
          {
            echo '### Forwarded test email — ad markup inspection'
            echo ''
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ''
            echo '```'
            cat /tmp/output.txt
            echo '```'
          } > /tmp/comment.md
          gh pr comment "$PR" --body-file /tmp/comment.md
