name: Betting CPA daily digest

# Daily CPA digest for the Spinfinite betting campaign (IO1109).
# Composes a 7-day blended view + per-LI/per-size breakdown and emails it
# via agentmail.to. Reads from Supabase (the same DATABASE_URL the refresh
# job populates), so it must run AFTER the daily refresh sweep.
#
# Triggered externally by cron-job.org via workflow_dispatch (same pattern
# as refresh.yml, weekly_report.yml, apple-news/daily-report.yml) because
# GitHub-native `schedule:` cron drifts hours late. Suggested cadence:
# 09:30 America/New_York daily (= 13:30 UTC EDT / 14:30 UTC EST) — half
# an hour after the 09:00 refresh sweep so the latest Improvado report
# is already in the DB.
#
# Manual ad-hoc:  gh workflow run betting_daily_digest.yml

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, build the digest and print it but don't send"
        required: false
        type: boolean
        default: false
      recipients_override:
        description: "Comma-separated recipients (blank = use BETTING_DIGEST_TO var)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Send digest
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            python betting_daily_update.py --dry-run
          else
            python betting_daily_update.py
          fi
        env:
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          AGENTMAIL_API_KEY:     ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX_ID:    ${{ secrets.AGENTMAIL_INBOX_ID }}
          BETTING_DIGEST_TO:     ${{ inputs.recipients_override != '' && inputs.recipients_override || vars.BETTING_DIGEST_TO }}
          BETTING_DIGEST_CC:     ${{ vars.BETTING_DIGEST_CC }}
          BETTING_CPA_TARGET:    ${{ vars.BETTING_CPA_TARGET }}
